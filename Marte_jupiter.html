<!DOCTYPE html>
<html>
  <head>
      <title>tu peso en un lugar donde pesas menos</title>
  </head>
  <body>
    <h1>Tu peso en otro planeta</h1>
    <p>En la tierra pesas distinto que en marte o juepiter</p>
    <script>
    var usuario = prompt("Cual es tu peso?")
    var planeta = parseInt(prompt("Elige tu planeta.\n1 es Marte, 2 es Jupiter"));
    var peso = parseInt(usuario);
    var g_tierra = 9.81;
    var g_marte = 3.7;
    var g_jupiter = 24.8;
    var peso_final;
    var n_plan;
    if (planeta == 1 )
    {
    n_plan = "Marte";
    peso_final = peso * g_marte / g_tierra;
    }
    else if (planeta == 2)
    {
    n_plan = "Jupiter";
    peso_final = peso *g_jupiter / g_tierra;
    }
    else
    {
    n_plan = "Kripton";
    peso_final = 1000000;
    }
    peso_final = parseInt(peso_final);
    document.write( "tu peso en " + n_plan + " es <strong>" + peso_final + " kilos</strong>");
    </script>
  </body>
</html>
